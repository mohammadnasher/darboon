apiVersion: v1
kind: ConfigMap
metadata:
  name: darboon-config
  namespace: darboon
data:
  NODE_ENV: 'production'
  PORT: '3000'
  DARBOON_ISSUER: 'https://auth.example.com'
  ACCESS_TOKEN_TTL: '900'
  REFRESH_TOKEN_TTL: '2592000'
  JWT_ALG: 'ES256'
  KEY_ROTATION_DAYS: '90'
  CHAPAR_BASE_URL: 'http://chapar.darboon.svc.cluster.local:3000'
  OTP_APP_NAME: 'Darboon'
  OTP_LENGTH: '6'
  OTP_TTL_SECONDS: '300'
  OTP_MAX_ATTEMPTS: '5'
  OTP_RESEND_WINDOW_SECONDS: '60'
  THROTTLE_TTL: '60'
  THROTTLE_LIMIT: '100'
  LOCKOUT_MAX_FAILURES: '5'
  LOCKOUT_BASE_SECONDS: '60'
  ARGON_MEMORY_COST: '19456'
  ARGON_TIME_COST: '2'
  ARGON_PARALLELISM: '1'
  CORS_ALLOWED_ORIGINS: 'https://s1.example.com,https://s2.example.com'
