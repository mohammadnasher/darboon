apiVersion: apps/v1
kind: Deployment
metadata:
  name: darboon-api
  namespace: darboon
  labels: { app: darboon, component: api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: darboon, component: api }
  template:
    metadata:
      labels: { app: darboon, component: api }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: darboon-api
          image: ghcr.io/mohammadnasher/darboon:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DARBOON_ROLE
              value: 'api'
            # Run migrations from the API deployment only (single owner).
            - name: RUN_MIGRATIONS
              value: 'true'
          envFrom:
            - configMapRef: { name: darboon-config }
            - secretRef: { name: darboon-secrets }
          readinessProbe:
            httpGet: { path: /health/ready, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: '1', memory: 512Mi }
