apiVersion: apps/v1
kind: Deployment
metadata:
  name: darboon-worker
  namespace: darboon
  labels: { app: darboon, component: worker }
spec:
  replicas: 1
  selector:
    matchLabels: { app: darboon, component: worker }
  template:
    metadata:
      labels: { app: darboon, component: worker }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: darboon-worker
          image: ghcr.io/mohammadnasher/darboon:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DARBOON_ROLE
              value: 'worker'
            - name: RUN_MIGRATIONS
              value: 'false'
          envFrom:
            - configMapRef: { name: darboon-config }
            - secretRef: { name: darboon-secrets }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: '1', memory: 512Mi }
